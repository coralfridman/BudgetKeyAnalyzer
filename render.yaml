services:
  - type: web
    name: poll-winner
    env: node
    plan: starter
    rootDir: poll-winner
    buildCommand: ""
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATA_FILE
        value: /var/data/data.json
    disk:
      name: poll-winner-data
      mountPath: /var/data
      sizeGB: 1
