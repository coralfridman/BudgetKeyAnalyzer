<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Poll Winner</title>
<style>
:root{--ink:#18212f;--muted:#667085;--line:#d8dee8;--bg:#f4f7fb;--accent:#0f8b8d;--gold:#d89b22}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(135deg,rgba(15,139,141,.1),transparent 34%),linear-gradient(225deg,rgba(216,155,34,.14),transparent 30%),var(--bg);color:var(--ink);font-family:Arial,sans-serif}.wrap{width:min(1120px,calc(100% - 28px));margin:auto}.top{display:flex;justify-content:space-between;align-items:center;padding:22px 0}.brand{font-weight:900;text-decoration:none;color:var(--ink);display:flex;gap:10px;align-items:center}.mark{display:grid;place-items:center;width:38px;height:38px;border-radius:8px;background:var(--accent);color:white}.actions{display:flex;gap:10px}button,a.btn{border:1px solid var(--line);background:white;color:var(--ink);border-radius:8px;min-height:40px;padding:0 14px;font-weight:800;text-decoration:none;cursor:pointer}.primary{background:var(--accent);color:white;border:0}.grid{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(320px,.9fr);gap:20px;align-items:start}.panel{background:white;border:1px solid var(--line);border-radius:8px;padding:26px;box-shadow:0 18px 45px rgba(24,33,47,.09)}h1{font-size:clamp(2rem,4vw,3.1rem);line-height:1.05;margin:0 0 20px}.eyebrow{margin:0 0 8px;color:#0a6668;font-weight:900;text-transform:uppercase;font-size:.78rem}.stack{display:grid;gap:14px}.field{display:grid;gap:7px;font-weight:800}input{width:100%;border:1px solid var(--line);border-radius:8px;padding:13px;background:#fbfcfe;color:var(--ink);font:inherit}.row{display:flex;gap:10px;align-items:center;justify-content:space-between}.options,.results{display:grid;gap:10px}.optionRow{display:grid;grid-template-columns:1fr 42px;gap:8px}.settings{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.check,.voteOpt,.result{border:1px solid var(--line);border-radius:8px;background:#fbfcfe;padding:12px;display:flex;gap:10px;align-items:center;font-weight:800}.voteOpt,.result{background:white}.result{display:grid}.bar{height:12px;background:#e9eef5;border-radius:99px;overflow:hidden}.fill{height:100%;background:var(--accent)}.winner{border-color:var(--gold);background:#fffaf0}.winner .fill{background:var(--gold)}.status{min-height:22px;color:var(--muted)}.hidden{display:none}.qr{width:296px;height:296px;border:1px solid var(--line);border-radius:8px}.pill{display:grid;place-items:center;min-width:42px;height:34px;border-radius:99px;background:#edf7f7;color:#0a6668;font-weight:900}@media(max-width:840px){.grid,.settings{grid-template-columns:1fr}.panel{padding:20px}}
</style>
</head>
<body>
<div class="wrap"><header class="top"><a class="brand" href="/"><span class="mark">PW</span><span>Poll Winner</span></a><div class="actions"><button id="lang">EN</button><a class="btn" href="/" data-i="newPoll"></a></div></header>
<main>
<section id="builder" class="grid"><div class="panel"><p class="eyebrow" data-i="builder"></p><h1 data-i="title"></h1><form id="pollForm" class="stack"><label class="field"><span data-i="question"></span><input id="question" maxlength="160" required></label><div class="row"><strong data-i="answers"></strong><button type="button" id="add" data-i="add"></button></div><div id="opts" class="options"></div><div class="settings"><label class="check"><input id="multi" type="checkbox" checked><span data-i="multi"></span></label><label class="check"><input id="one" type="checkbox" checked><span data-i="one"></span></label><label class="check"><input id="names" type="checkbox"><span data-i="names"></span></label></div><button class="primary" data-i="create"></button><div id="buildStatus" class="status"></div></form></div><aside class="panel"><p class="eyebrow" data-i="preview"></p><h2 id="previewQ"></h2><div id="previewO" class="options"></div></aside></section>
<section id="voteView" class="grid hidden"><div class="panel"><p class="eyebrow" data-i="live"></p><h1 id="pollQ"></h1><form id="voteForm" class="stack"><label class="field"><span data-i="yourName"></span><input id="voter" maxlength="60" required></label><div id="voteOpts" class="options"></div><button class="primary" data-i="vote"></button><div id="voteStatus" class="status"></div></form></div><aside class="panel"><div class="row"><div><p class="eyebrow" data-i="results"></p><h2 id="win"></h2></div><span id="count" class="pill">0</span></div><div id="res" class="results"></div></aside></section>
<section id="adminView" class="grid hidden"><div class="panel"><p class="eyebrow" data-i="admin"></p><h1 id="adminQ"></h1><img id="qr" class="qr" alt="QR"><label class="field"><span data-i="share"></span><input id="share" readonly></label><button id="copy" data-i="copy"></button><form id="settings" class="settings"><label class="check"><input id="amulti" type="checkbox"><span data-i="multi"></span></label><label class="check"><input id="aone" type="checkbox"><span data-i="one"></span></label><label class="check"><input id="anames" type="checkbox"><span data-i="names"></span></label><button class="primary" data-i="save"></button></form><div id="adminStatus" class="status"></div></div><aside class="panel"><div class="row"><div><p class="eyebrow" data-i="results"></p><h2 id="awin"></h2></div><span id="acount" class="pill">0</span></div><div id="ares" class="results"></div></aside></section>
</main></div>
<script>
const H={newPoll:'\u05e1\u05e7\u05e8 \u05d7\u05d3\u05e9',builder:'\u05d9\u05e6\u05d9\u05e8\u05ea \u05e1\u05e7\u05e8',title:'\u05d1\u05d5\u05e0\u05d9\u05dd \u05e1\u05e7\u05e8, \u05de\u05e9\u05ea\u05e4\u05d9\u05dd \u05d1-QR, \u05d5\u05e8\u05d5\u05d0\u05d9\u05dd \u05de\u05e0\u05e6\u05d7 \u05d1\u05d6\u05de\u05df \u05d0\u05de\u05ea.',question:'\u05e9\u05d0\u05dc\u05d4',answers:'\u05ea\u05e9\u05d5\u05d1\u05d5\u05ea',add:'\u05d4\u05d5\u05e1\u05e4\u05ea \u05ea\u05e9\u05d5\u05d1\u05d4',multi:'\u05d0\u05e4\u05e9\u05e8 \u05db\u05de\u05d4 \u05ea\u05e9\u05d5\u05d1\u05d5\u05ea',one:'\u05d4\u05e6\u05d1\u05e2\u05d4 \u05d0\u05d7\u05ea \u05dc\u05db\u05dc \u05e9\u05dd',names:'\u05dc\u05d4\u05e6\u05d9\u05d2 \u05e9\u05de\u05d5\u05ea \u05de\u05e6\u05d1\u05d9\u05e2\u05d9\u05dd',create:'\u05d9\u05e6\u05d9\u05e8\u05ea \u05e1\u05e7\u05e8',preview:'\u05ea\u05e6\u05d5\u05d2\u05d4',live:'\u05e1\u05e7\u05e8 \u05d7\u05d9',yourName:'\u05d4\u05e9\u05dd \u05e9\u05dc\u05da',vote:'\u05d4\u05e6\u05d1\u05e2\u05d4',results:'\u05ea\u05d5\u05e6\u05d0\u05d5\u05ea',admin:'\u05e0\u05d9\u05d4\u05d5\u05dc',share:'\u05e7\u05d9\u05e9\u05d5\u05e8 \u05dc\u05e9\u05d9\u05ea\u05d5\u05e3',copy:'\u05d4\u05e2\u05ea\u05e7\u05ea \u05e7\u05d9\u05e9\u05d5\u05e8',save:'\u05e9\u05de\u05d9\u05e8\u05ea \u05d4\u05d2\u05d3\u05e8\u05d5\u05ea',winner:'\u05de\u05e0\u05e6\u05d7',tie:'\u05ea\u05d9\u05e7\u05d5',waiting:'\u05de\u05d7\u05db\u05d9\u05dd \u05dc\u05d4\u05e6\u05d1\u05e2\u05d5\u05ea',votes:'\u05d4\u05e6\u05d1\u05e2\u05d5\u05ea',saved:'\u05e0\u05e9\u05de\u05e8',err:'\u05d7\u05e1\u05e8 \u05e9\u05dd \u05d0\u05d5 \u05ea\u05e9\u05d5\u05d1\u05d4',dup:'\u05d4\u05e9\u05dd \u05db\u05d1\u05e8 \u05d4\u05e6\u05d1\u05d9\u05e2'};
const E={newPoll:'New poll',builder:'Poll builder',title:'Build a poll, share a QR, and watch the winner update live.',question:'Question',answers:'Answers',add:'Add answer',multi:'Allow multiple answers',one:'One vote per name',names:'Show voter names',create:'Create poll',preview:'Preview',live:'Live poll',yourName:'Your name',vote:'Vote',results:'Results',admin:'Admin',share:'Share link',copy:'Copy link',save:'Save settings',winner:'Winner',tie:'Tie',waiting:'Waiting for votes',votes:'votes',saved:'Saved',err:'Enter a name and answer',dup:'That name already voted'};
let L=localStorage.lang||'he',poll,stream;const $=s=>document.querySelector(s),T=k=>(L==='he'?H:E)[k]||k;function lang(){document.documentElement.lang=L;document.documentElement.dir=L==='he'?'rtl':'ltr';$('#lang').textContent=L==='he'?'EN':'\u05e2\u05d1';document.querySelectorAll('[data-i]').forEach(e=>e.textContent=T(e.dataset.i));$('#question').placeholder=L==='he'?'\u05de\u05d4 \u05e0\u05d0\u05db\u05dc \u05d4\u05e2\u05e8\u05d1?':'What should we eat?';$('#voter').placeholder=L==='he'?'\u05d3\u05e0\u05d4':'Dana'}
function add(v=''){let d=document.createElement('div');d.className='optionRow';d.innerHTML=`<input value="${v}" required><button type="button">x</button>`;d.querySelector('button').onclick=()=>{if($('#opts').children.length>2){d.remove();prev()}};d.querySelector('input').oninput=prev;$('#opts').append(d);prev()}function vals(){return [...document.querySelectorAll('#opts input')].map(i=>i.value.trim()).filter(Boolean)}function prev(){let q=$('#question').value||$('#question').placeholder;$('#previewQ').textContent=q;$('#previewO').innerHTML='';(vals().length?vals():(L==='he'?['\u05e4\u05d9\u05e6\u05d4','\u05e1\u05d5\u05e9\u05d9']:['Pizza','Sushi'])).forEach(o=>{let d=document.createElement('div');d.className='voteOpt';d.textContent=o;$('#previewO').append(d)})}
function show(id){['builder','voteView','adminView'].forEach(x=>$('#'+x).classList.toggle('hidden',x!==id))}async function load(id,token,admin){let r=await fetch(`/api/polls/${id}${token?'?admin='+token:''}`);poll=await r.json();L=poll.settings.language;localStorage.lang=L;lang();render({...poll,isAdmin:admin});stream=new EventSource(`/api/polls/${id}/stream`);stream.addEventListener('poll',e=>{poll={...JSON.parse(e.data),isAdmin:admin};render(poll)});if(admin)setup(token)}
function render(p){if(p.isAdmin){$('#adminQ').textContent=p.question;$('#amulti').checked=p.settings.allowMultipleAnswers;$('#aone').checked=p.settings.oneVotePerName;$('#anames').checked=p.settings.showVoters;let u=location.origin+'/?poll='+p.id;$('#share').value=u;$('#qr').src='https://api.qrserver.com/v1/create-qr-code/?size=296x296&data='+encodeURIComponent(u);results(p,$('#ares'),$('#awin'),$('#acount'));return}$('#pollQ').textContent=p.question;let type=p.settings.allowMultipleAnswers?'checkbox':'radio';$('#voteOpts').innerHTML='';p.options.forEach(o=>{let l=document.createElement('label');l.className='voteOpt';l.innerHTML=`<input type="${type}" name="o" value="${o.id}"><span>${esc(o.text)}</span>`;$('#voteOpts').append(l)});results(p,$('#res'),$('#win'),$('#count'))}
function results(p,box,title,count){count.textContent=p.votesCount;title.textContent=p.winners.length?`${p.winners.length>1?T('tie'):T('winner')}: `+p.options.filter(o=>p.winners.includes(o.id)).map(o=>o.text).join(', '):T('waiting');let max=Math.max(1,...p.options.map(o=>o.votes));box.innerHTML='';p.options.forEach(o=>{let d=document.createElement('div');d.className='result '+(p.winners.includes(o.id)?'winner':'');d.innerHTML=`<div class="row"><b>${esc(o.text)}</b><b>${o.votes} ${T('votes')}</b></div><div class="bar"><div class="fill" style="width:${Math.round(o.votes/max*100)}%"></div></div>${o.voters?.length?'<small>'+esc(o.voters.join(', '))+'</small>':''}`;box.append(d)})}
$('#lang').onclick=()=>{L=L==='he'?'en':'he';localStorage.lang=L;lang();prev()};$('#add').onclick=()=>add();$('#question').oninput=prev;['Pizza','Sushi','Falafel'].forEach(add);lang();prev();$('#pollForm').onsubmit=async e=>{e.preventDefault();let r=await fetch('/api/polls',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:$('#question').value,options:vals(),language:L,allowMultipleAnswers:$('#multi').checked,oneVotePerName:$('#one').checked,showVoters:$('#names').checked})});let j=await r.json();location.href=j.adminUrl};$('#voteForm').onsubmit=async e=>{e.preventDefault();let ids=[...document.querySelectorAll('#voteOpts input:checked')].map(i=>i.value);let r=await fetch(`/api/polls/${poll.id}/vote`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({voterName:$('#voter').value,optionIds:ids})});$('#voteStatus').textContent=r.status===409?T('dup'):r.ok?T('saved'):T('err')};function setup(token){$('#copy').onclick=()=>navigator.clipboard.writeText($('#share').value);$('#settings').onsubmit=async e=>{e.preventDefault();await fetch(`/api/polls/${poll.id}/settings`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminToken:token,allowMultipleAnswers:$('#amulti').checked,oneVotePerName:$('#aone').checked,showVoters:$('#anames').checked,language:L})});$('#adminStatus').textContent=T('saved')}}function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}let p=new URLSearchParams(location.search);if(p.get('admin')){show('adminView');load(p.get('admin'),p.get('token'),true)}else if(p.get('poll')){show('voteView');load(p.get('poll'),null,false)}
</script>
</body></html>
